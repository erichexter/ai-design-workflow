name: Generate Prompt Registry

on:
  push:
    branches:
      - master
    paths:
      - "prompts/**"
      - "mcp-server/scripts/generate-registry.mjs"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Regenerate prompts.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — no PAT needed for public repo commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate prompts.json
        run: node mcp-server/scripts/generate-registry.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mcp-server/prompts.json
          # Only commit if prompts.json actually changed
          if git diff --cached --quiet; then
            echo "prompts.json is unchanged — nothing to commit"
          else
            git commit -m "chore: regenerate prompts.json [skip ci]"
            git push
          fi
